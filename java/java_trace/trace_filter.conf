# libkperf Java trace local filter configuration.
# This file is shipped with the tool and can be edited by users.
# Rules use Java class names or JVM internal names. Both '.' and '/' are accepted.
# Method descriptor is optional.
# Examples:
#   com.example.Foo
#   com.example.Foo::bar
#   com.example.Foo::bar(Ljava/lang/String;)V
#   com.example.service.*

context_depth=1
context_max_methods=128

[include]

[exclude]
java.*
javax.*
jakarta.*
jdk.*
sun.*
com.sun.*
com.libkperf.tracex.*
org.objectweb.asm.*
net.bytebuddy.*
javassist.*
