# Trace filter configuration.

############################ Java trace ############################

# Number of entries in the shared-memory ring buffer.
# Each entry occupies 512 bytes and stores one method-enter or method-exit event.
# Memory usage: slot_count * 512 bytes + 64-byte header.
# Default: 524288 slots (about 256 MB), Maximum: 67108864 slots (about 32 GB)
# Need increase this value for high-frequency methods or long collection intervals.
slot_count=524288

# Java call-graph context expansion depth. This item is not restricted, but the total number depends on 'context_max_methods'
# 0 disables expansion and instruments only UTraceAttr and [java_include] matches.
# Values greater than 0 may add caller/callee methods around matched methods.
context_depth=0

# Upper limit for methods produced by call-graph context expansion.
context_max_methods=128

# Java rule syntax. Please refer to the following input format:
#   com.example.service.*
#       Match classes directly in com.example.service, but not subpackages.
#   com.example.service.**
#       Match classes in com.example.service and all nested subpackages.
#   com.example.Foo
#       Match every eligible method declared by this exact class.
#   com.example.Foo::bar
#       Match method bar in class com.example.Foo, any descriptor.
#   com.example.Foo::ba*
#       Match methods whose names start with ba in class com.example.Foo.
#   com.example.Foo::bar(Ljava/lang/String;)V
#       Match method bar with the exact JVM method descriptor.

# Additional classes or methods to instrument besides UTraceAttr symbols.
[java_include]


# Java classes or methods excluded from instrumentation with the highest priority.
[java_exclude]
# Agent and trace runtime
com.libkperf.tracex.**
# Prevent recursion
java.lang.ThreadLocal*
# ThreadLocalMap calls Reference.refersTo before TraceRuntime can set its recursion guard.
java.lang.ref.**
java.util.concurrent.atomic.AtomicBoolean::get
java.util.concurrent.locks.**
java.lang.instrument.**
# Internal JDK implementation packages are unstable and frequently contain VM/native bridge code.
jdk.**
sun.**
com.sun.**
# Bytecode transformation frameworks may run while classes are being loaded or retransformed
org.objectweb.asm.**
net.bytebuddy.**
javassist.**
