# Trace filter configuration.

############################ Java trace ############################

# Number of Java trace event slots
# Default: 262144 slots (about 128 MB), Maximum: 67108864 slots (about 32 GB)
slot_count=262144

# Java call-graph context expansion depth.
# Values greater than 0 may add caller/callee methods around matched methods. Ignored when include_all=true.
context_depth=0

# Upper limit for methods added by Java context expansion.
# This does not limit methods explicitly matched by include rules.
context_max_methods=128

# Instrument all Java methods except [java_exclude] when set to true.
include_all=false

# Java rule syntax. Please refer to the following input format:
#   com.example.service.*
#       Match classes directly under package com.example.service.
#   com.example.service.**
#       Match classes under package com.example.service recursively.
#   com.example.Foo::bar
#       Match method bar in class com.example.Foo, any descriptor.
#   com.example.Foo::ba*
#       Match methods whose names start with ba in class com.example.Foo.
#   com.example.Foo::bar(Ljava/lang/String;)V
#       Match method bar with the exact JVM method descriptor.

# Additional Java classes or methods to instrument besides UTraceAttr symSrc or hotspot functions.
[java_include]


# Java classes or methods excluded from instrumentation with the highest priority.
# Keep JVM, agent, and bytecode-manipulation packages excluded by default.
[java_exclude]
java.**
javax.**
jakarta.**
jdk.**
sun.**
com.sun.**
org.objectweb.asm.**
net.bytebuddy.**
javassist.**
