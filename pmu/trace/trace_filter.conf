# trace filter configuration.

###################Java########################

# Number of Java shared-memory event slots. Default: 1048576 slots use about 512 MB.
# The maximum is 67108864 slots (about 32 GB)
slot_count=1048576
# Java call-graph context expansion depth; ignored when include_all=true
context_depth=1
# Maximum number of Java methods added by context expansion
context_max_methods=128
# Instrument all non-excluded Java methods when set to true
include_all=false

# Java rule examples:
# com.example.service.**
# com.example.Foo::bar
# com.example.Foo::bar(Ljava/lang/String;)V

# Additional Java classes or methods to instrument besides UTraceAttr symSrc
[include]

# Java classes or methods excluded from instrumentation with the highest priority
[exclude]
java.**
javax.**
jakarta.**
jdk.**
sun.**
com.sun.**
org.objectweb.asm.**
net.bytebuddy.**
javassist.**
